name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.4.2
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3 or v1.2.3-beta.1" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install npm with OIDC trusted publishing support
        run: npm install -g "npm@^11.5.1"

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [ "v$package_version" != "${{ steps.release.outputs.tag }}" ]; then
            echo "Tag ${{ steps.release.outputs.tag }} does not match package version v$package_version" >&2
            exit 1
          fi

      - run: pnpm run check

      - name: Publish to npm with trusted publishing
        run: npm publish
