<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" aria-labelledby="title desc" role="img" viewBox="0 0 1280 640"><title id="title">pi-fusion</title><desc id="desc">Several models run in parallel, then one synthesizes the answer.</desc><style>text{font-family:&apos;Inter&apos;,system-ui,-apple-system,&apos;Segoe UI&apos;,sans-serif}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.kicker{font-size:22px;font-weight:600;fill:#6e7268;letter-spacing:4px}.title{font-size:116px;font-weight:800;fill:#16301f;letter-spacing:-3px}.sub{font-size:33px;font-weight:600;fill:#6e7268}.small{font-size:23px;font-weight:500;fill:#8b8f86}.blockTitle{fill:#eef3ea;font-weight:700}.blockSub{fill:rgba(238,243,234,.72);font-size:16px;font-weight:500}.outlineTitle{fill:#0e481f;font-weight:700}.outlineSub{fill:#6e7268;font-size:16px;font-weight:500}.pillText{fill:#16301f;font-size:22px;font-weight:600}.edge,.edgeFaint{fill:none;stroke:#0e481f;stroke-width:2.5;stroke-linecap:round;opacity:.9}.edgeFaint{stroke-width:1.6;opacity:.32}.wordmark{fill:#6e7268;font-size:24px;font-weight:600;letter-spacing:.3px}</style><rect width="1280" height="640" fill="#ECEBE6"/><text x="88" y="214" class="kicker mono">COMPOUND AI · FOR PI</text><text x="84" y="320" class="title">pi-fusion</text><text x="90" y="384" class="sub">several models, in parallel</text><text x="90" y="430" class="small">one synthesized answer</text><path d="M1000 168 C1000 214, 858 214, 858 260" class="edge"/><path d="M1000 168 C1000 214, 1142 214, 1142 260" class="edge"/><path d="M858 332 C858 372, 838 372, 838 412" class="edgeFaint"/><path d="M858 332 C858 372, 1000 372, 1000 412" class="edgeFaint"/><path d="M858 332 C858 372, 1162 372, 1162 412" class="edgeFaint"/><path d="M1142 332 C1142 372, 838 372, 838 412" class="edgeFaint"/><path d="M1142 332 C1142 372, 1000 372, 1000 412" class="edgeFaint"/><path d="M1142 332 C1142 372, 1162 372, 1162 412" class="edgeFaint"/><path d="M838 506 C838 540, 940 540, 940 540" class="edge"/><path d="M1000 506 C1000 540, 1000 540, 1000 540" class="edge"/><path d="M1162 506 C1162 540, 1060 540, 1060 540" class="edge"/><path d="M772 332 C668 412, 668 502, 762 560" class="edge"/><rect width="224" height="64" x="888" y="104" fill="#E3E2DC" stroke="#C7C7C0" stroke-width="2" rx="32"/><text x="1000" y="144" class="pillText" text-anchor="middle">Your prompt</text><rect width="260" height="72" x="728" y="260" fill="rgba(14,72,31,0.09)" stroke="#0E481F" stroke-width="2.5" rx="12"/><text x="858" y="298" class="outlineTitle" font-size="26" text-anchor="middle">Discovery<tspan dy="-9" font-size="17">*</tspan></text><text x="858" y="320" class="outlineSub" text-anchor="middle">loads context once</text><rect width="260" height="72" x="1012" y="260" fill="rgba(14,72,31,0.09)" stroke="#0E481F" stroke-width="2.5" rx="12"/><text x="1142" y="298" class="outlineTitle" font-size="26" text-anchor="middle">Prompt rewrite<tspan dy="-9" font-size="17">*</tspan></text><text x="1142" y="320" class="outlineSub" text-anchor="middle">varies the angle</text><rect width="150" height="94" x="763" y="412" fill="#0E481F" rx="12"/><text x="838" y="454" class="blockTitle" font-size="24" text-anchor="middle">Worker</text><text x="838" y="478" class="blockSub" text-anchor="middle">angle 1</text><rect width="150" height="94" x="925" y="412" fill="#0E481F" rx="12"/><text x="1000" y="454" class="blockTitle" font-size="24" text-anchor="middle">Worker</text><text x="1000" y="478" class="blockSub" text-anchor="middle">angle 2</text><rect width="150" height="94" x="1087" y="412" fill="#0E481F" rx="12"/><text x="1162" y="454" class="blockTitle" font-size="24" text-anchor="middle">Worker</text><text x="1162" y="478" class="blockSub" text-anchor="middle">angle 3</text><rect width="480" height="60" x="760" y="540" fill="#0E481F" rx="12"/><text x="1000" y="578" class="blockTitle" font-size="26" text-anchor="middle">Synthesis · one final answer</text><text x="1000" y="626" fill="#8B8F86" font-size="18" font-weight="500" text-anchor="middle">* Optional step</text><circle cx="100" cy="556" r="22" fill="none" stroke="#0E481F" stroke-width="4.5"/><text x="100" y="566" fill="#0E481F" class="mono" font-size="34" font-weight="700" text-anchor="middle">∪</text><text x="134" y="565" class="wordmark mono">pi-fusion</text></svg>