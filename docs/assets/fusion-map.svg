<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="506" aria-labelledby="title desc" role="img" viewBox="0 0 1080 506"><title id="title">pi-fusion planning flow</title><desc id="desc">A prompt fans out to optional discovery and rewrite, then parallel workers, then one synthesis turn.</desc><style>text{font-family:&apos;Inter&apos;,system-ui,-apple-system,&apos;Segoe UI&apos;,sans-serif}.blockTitle{fill:#eef3ea;font-weight:700}.blockSub{fill:rgba(238,243,234,.72);font-size:14px;font-weight:500}.outlineTitle{fill:#0e481f;font-weight:700}.outlineSub{fill:#6e7268;font-size:14px;font-weight:500}.pillText{fill:#16301f;font-size:18px;font-weight:600}.edge,.edgeFaint{fill:none;stroke:#0e481f;stroke-width:2.25;stroke-linecap:round;opacity:.9}.edgeFaint{stroke-width:1.5;opacity:.32}</style><rect width="1080" height="506" fill="#ECEBE6"/><path d="M540 96 C540 123, 398 123, 398 150" class="edge"/><path d="M540 96 C540 123, 682 123, 682 150" class="edge"/><path d="M398 214 C398 255, 370 255, 370 296" class="edgeFaint"/><path d="M398 214 C398 255, 540 255, 540 296" class="edgeFaint"/><path d="M398 214 C398 255, 710 255, 710 296" class="edgeFaint"/><path d="M682 214 C682 255, 370 255, 370 296" class="edgeFaint"/><path d="M682 214 C682 255, 540 255, 540 296" class="edgeFaint"/><path d="M682 214 C682 255, 710 255, 710 296" class="edgeFaint"/><path d="M370 380 C370 398, 440 398, 440 416" class="edge"/><path d="M540 380 C540 398, 540 398, 540 416" class="edge"/><path d="M710 380 C710 398, 640 398, 640 416" class="edge"/><path d="M320 214 C240 300, 240 386, 362 440" class="edge"/><rect width="224" height="60" x="428" y="36" fill="#E3E2DC" stroke="#C7C7C0" stroke-width="2" rx="30"/><text x="540" y="73" class="pillText" text-anchor="middle">Your prompt</text><rect width="260" height="64" x="268" y="150" fill="rgba(14,72,31,0.09)" stroke="#0E481F" stroke-width="2.5" rx="12"/><text x="398" y="182" class="outlineTitle" font-size="22" text-anchor="middle">Discovery<tspan dy="-7" font-size="15">*</tspan></text><text x="398" y="202" class="outlineSub" text-anchor="middle">loads context once</text><rect width="260" height="64" x="552" y="150" fill="rgba(14,72,31,0.09)" stroke="#0E481F" stroke-width="2.5" rx="12"/><text x="682" y="182" class="outlineTitle" font-size="22" text-anchor="middle">Prompt rewrite<tspan dy="-7" font-size="15">*</tspan></text><text x="682" y="202" class="outlineSub" text-anchor="middle">varies the angle</text><rect width="150" height="84" x="295" y="296" fill="#0E481F" rx="12"/><text x="370" y="334" class="blockTitle" font-size="21" text-anchor="middle">Worker</text><text x="370" y="356" class="blockSub" text-anchor="middle">angle 1</text><rect width="150" height="84" x="465" y="296" fill="#0E481F" rx="12"/><text x="540" y="334" class="blockTitle" font-size="21" text-anchor="middle">Worker</text><text x="540" y="356" class="blockSub" text-anchor="middle">angle 2</text><rect width="150" height="84" x="635" y="296" fill="#0E481F" rx="12"/><text x="710" y="334" class="blockTitle" font-size="21" text-anchor="middle">Worker</text><text x="710" y="356" class="blockSub" text-anchor="middle">angle 3</text><rect width="360" height="48" x="360" y="416" fill="#0E481F" rx="12"/><text x="540" y="446" class="blockTitle" font-size="22" text-anchor="middle">Synthesis · one final answer</text><text x="540" y="492" fill="#8B8F86" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" text-anchor="middle">* Optional step</text></svg>