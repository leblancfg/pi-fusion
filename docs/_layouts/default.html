<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ECEBE6" />
    <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}" />
    <meta
      name="keywords"
      content="pi, pi package, pi extension, compound AI, test-time compute, inference-time scaling, mixture-of-agents, multi-agent planning, coding agent, developer tools"
    />
    <meta name="author" content="François Leblanc" />
    <link rel="canonical" href="{{ page.url | absolute_url }}" />
    <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml" />
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}" />
    <meta property="og:description" content="{{ page.description | default: site.description | escape }}" />
    <meta property="og:image" content="{{ '/assets/social-preview.png' | absolute_url }}" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}" />
    <meta name="twitter:description" content="{{ page.description | default: site.description | escape }}" />
    <meta name="twitter:image" content="{{ '/assets/social-preview.png' | absolute_url }}" />
  </head>
  <body>
    <main>
      <header class="site-header">
        <div class="header-top">
          <a class="brand-mark" href="{{ '/' | relative_url }}" aria-label="pi-fusion home">
            <span class="brand-orbit" aria-hidden="true">∪</span>
          </a>
          <nav class="social" aria-label="Project links">
            <a class="social-link" href="https://github.com/leblancfg/pi-fusion">Github</a>
            <a class="social-link" href="https://www.npmjs.com/package/@leblancfg/pi-fusion">npm</a>
            <a class="social-link" href="https://pi.dev/packages/@leblancfg/pi-fusion">pi.dev</a>
          </nav>
        </div>
        <p class="eyebrow">pi extension</p>
        <h1>{{ page.heading | default: page.title | default: site.title }}</h1>
        {% if page.lead %}
        <p class="lead">{{ page.lead }}</p>
        {% endif %}
        <nav class="actions" aria-label="Site navigation">
          <a class="button{% if page.url == '/' %} primary{% endif %}" href="{{ '/' | relative_url }}">Overview</a>
          <a class="button{% if page.url == '/presets/' %} primary{% endif %}" href="{{ '/presets/' | relative_url }}">Presets & Prompts</a>
        </nav>
      </header>

      <article class="content">{{ content }}</article>

      <footer>MIT licensed. Built for <a href="https://pi.dev">pi</a>. Source on <a href="https://github.com/leblancfg/pi-fusion">GitHub</a>.</footer>
    </main>
  </body>
</html>
